name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify syntax
        run: |
          node --check app.js
          node --check server.js

      - name: Start server
        run: |
          node server.js > /tmp/mix-design-studio.log 2>&1 &
          echo $! > /tmp/mix-design-studio.pid
          sleep 2

      - name: Smoke test API
        run: |
          curl -fsS http://127.0.0.1:3000/api/health
          curl -fsS http://127.0.0.1:3000/api/cases?userId=Plant%20A

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/mix-design-studio.pid ]; then
            kill "$(cat /tmp/mix-design-studio.pid)" || true
          fi
